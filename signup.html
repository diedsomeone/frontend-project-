<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Student Performance Tracker</title>
  <link rel="stylesheet" href="../css/modern-home.css">
  <style>
    body {
      background: #f7f5fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .signup-container {
      background: #fff;
      border-radius: 2rem;
      box-shadow: 0 8px 32px 0 #b39ddb33;
      padding: 2.5rem 2.5rem 2.2rem 2.5rem;
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 2rem 1rem;
    }
    .signup-text {
      font-size: 1.15rem;
      color: #5f0a87;
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 500;
    }
    .signup-btn {
      background: #92119e;
      color: #fff;
      border: none;
      border-radius: 1.2rem;
      padding: 0.9rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px #b39ddb22;
      transition: background 0.3s;
      margin-top: 1rem;
    }
    .signup-btn:hover {
      background: #5f0a87;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <p class="signup-text">
      Want to explore the Student Performance Tracker? Sign up here to access your role (Student, Teacher, or Admin) and continue seamlessly.
    </p>
    <button class="signup-btn">Sign Up</button>
  </div>
</body>
</html>
