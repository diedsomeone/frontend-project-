<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Tracker - Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset and base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .illustration {
            display: none;
            flex: 1;
            justify-content: center;
            align-items: center;
            animation: slideInLeft 1.1s cubic-bezier(.68,-0.55,.27,1.55) both;
        }
        .illustration img {
            width: 350px;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(60, 100, 180, 0.10);
        }
        @media (min-width: 900px) {
            .illustration {
                display: flex;
            }
        }
        .signup-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(60, 100, 180, 0.12);
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            margin: 2rem auto;
            animation: slideInRight 1.1s cubic-bezier(.68,-0.55,.27,1.55) both;
        }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-80px) scale(0.95); }
            60% { opacity: 1; transform: translateX(16px) scale(1.03); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(80px) scale(0.95); }
            60% { opacity: 1; transform: translateX(-16px) scale(1.03); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .signup-title {
            font-size: 2rem;
            font-weight: 700;
            color: #3a3a3a;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .signup-desc {
            font-size: 1rem;
            color: #6a6a6a;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .input-group input,
        .input-group select {
            padding: 0.75rem 2.5rem 0.75rem 2.5rem;
            border: 1px solid #d0d0d0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .input-group input:focus,
        .input-group select:focus {
            border-color: #4f8cff;
            box-shadow: 0 0 0 2px #e0eafc;
        }
        .input-group label {
            font-size: 0.95rem;
            color: #3a3a3a;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .input-group .input-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #b0b0b0;
            font-size: 1.1rem;
            pointer-events: none;
        }
        .input-group .toggle-password {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #b0b0b0;
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .input-group .toggle-password:hover {
            color: #4f8cff;
        }
        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            min-height: 1.1em;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: #4f8cff;
        }
        .form-actions {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg, #4f8cff 0%, #6ad1ff 100%);
            color: #fff;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #6ad1ff 0%, #4f8cff 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .btn-reset {
            background: #f0f0f0;
            color: #3a3a3a;
            border: 1px solid #d0d0d0;
            transition: background 0.3s, color 0.3s;
        }
        .btn-reset:hover {
            background: #e0eafc;
            color: #4f8cff;
        }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            color: #4f8cff;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .login-link:hover {
            color: #6ad1ff;
        }
        .success-message {
            text-align: center;
            color: #4f8cff;
            font-size: 1.1rem;
            margin-top: 1rem;
            font-weight: 600;
            animation: fadeIn 0.7s;
        }
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                padding: 1rem;
            }
            .signup-card {
                padding: 1.2rem 0.7rem;
                max-width: 98vw;
                animation: slideInUp 1.1s cubic-bezier(.68,-0.55,.27,1.55) both;
            }
            .illustration {
                animation: slideInDown 1.1s cubic-bezier(.68,-0.55,.27,1.55) both;
            }
            .illustration img {
                width: 180px;
            }
        }
        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(80px) scale(0.95); }
            60% { opacity: 1; transform: translateY(-16px) scale(1.03); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideInDown {
            0% { opacity: 0; transform: translateY(-80px) scale(0.95); }
            60% { opacity: 1; transform: translateY(16px) scale(1.03); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="illustration">
            <img src="https://cdn.pixabay.com/photo/2016/03/31/19/56/education-1294137_1280.png" alt="Education Illustration">
        </div>
        <div class="signup-card">
            <div class="signup-title">Student Performance Tracker</div>
            <div class="signup-desc">Create your account to access the performance tracking system</div>
            <form class="signup-form" id="signupForm" autocomplete="off">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <i class="fa fa-user input-icon"></i>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your name">
                    <div class="error-message" id="errorFullName"></div>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <i class="fa fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                    <div class="error-message" id="errorEmail"></div>
                </div>
                <div class="input-group">
                    <label for="rollNumber">Roll Number</label>
                    <i class="fa fa-id-badge input-icon"></i>
                    <input type="text" id="rollNumber" name="rollNumber" required placeholder="Enter roll number">
                    <div class="error-message" id="errorRollNumber"></div>
                </div>
                <div class="input-group">
                    <label for="department">Department</label>
                    <i class="fa fa-building input-icon"></i>
                    <select id="department" name="department" required>
                        <option value="">Select department</option>
                        <option value="CSE">Computer Science</option>
                        <option value="ECE">Electronics</option>
                        <option value="ME">Mechanical</option>
                        <option value="CE">Civil</option>
                        <option value="EE">Electrical</option>
                        <option value="Other">Other</option>
                    </select>
                    <div class="error-message" id="errorDepartment"></div>
                </div>
                <div class="input-group">
                    <label for="semester">Semester</label>
                    <i class="fa fa-calendar input-icon"></i>
                    <select id="semester" name="semester" required>
                        <option value="">Select semester</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                    <div class="error-message" id="errorSemester"></div>
                </div>
                <div class="input-group">
                    <label for="role">Role</label>
                    <i class="fa fa-user-tag input-icon"></i>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <div class="error-message" id="errorRole"></div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                    <span class="toggle-password" id="togglePassword"><i class="fa fa-eye"></i></span>
                    <div class="error-message" id="errorPassword"></div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password">
                    <span class="toggle-password" id="toggleConfirmPassword"><i class="fa fa-eye"></i></span>
                    <div class="error-message" id="errorConfirmPassword"></div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" style="font-size:0.95rem;">I agree to the <a href="#" style="color:#4f8cff;text-decoration:underline;">Terms & Conditions</a></label>
                </div>
                <div class="error-message" id="errorTerms"></div>
                <div class="form-actions">
                    <button type="submit" class="btn">Sign Up</button>
                    <button type="reset" class="btn btn-reset">Reset</button>
                </div>
            </form>
            <a href="#" class="login-link">Already have an account? Login</a>
            <div class="success-message" id="successMessage" style="display:none;"></div>
        </div>
    </div>
    <script>
        // Password show/hide toggle
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
        });
        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            toggleConfirmPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
        });

        // Form validation
        const signupForm = document.getElementById('signupForm');
        const successMessage = document.getElementById('successMessage');
        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            successMessage.style.display = 'none';

            // Full Name
            const fullName = signupForm.fullName.value.trim();
            if (!fullName) {
                document.getElementById('errorFullName').textContent = 'Full Name is required.';
                valid = false;
            }
            // Email
            const email = signupForm.email.value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                document.getElementById('errorEmail').textContent = 'Email is required.';
                valid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('errorEmail').textContent = 'Enter a valid email address.';
                valid = false;
            }
            // Roll Number
            const rollNumber = signupForm.rollNumber.value.trim();
            if (!rollNumber) {
                document.getElementById('errorRollNumber').textContent = 'Roll Number is required.';
                valid = false;
            } else if (!/^\d+$/.test(rollNumber)) {
                document.getElementById('errorRollNumber').textContent = 'Roll Number must be numeric.';
                valid = false;
            }
            // Department
            const department = signupForm.department.value;
            if (!department) {
                document.getElementById('errorDepartment').textContent = 'Select a department.';
                valid = false;
            }
            // Semester
            const semester = signupForm.semester.value;
            if (!semester) {
                document.getElementById('errorSemester').textContent = 'Select a semester.';
                valid = false;
            }
            // Role
            const role = signupForm.role.value;
            if (!role) {
                document.getElementById('errorRole').textContent = 'Select a role.';
                valid = false;
            }
            // Password
            const password = signupForm.password.value;
            if (!password) {
                document.getElementById('errorPassword').textContent = 'Password is required.';
                valid = false;
            } else if (password.length < 6) {
                document.getElementById('errorPassword').textContent = 'Password must be at least 6 characters.';
                valid = false;
            }
            // Confirm Password
            const confirmPassword = signupForm.confirmPassword.value;
            if (!confirmPassword) {
                document.getElementById('errorConfirmPassword').textContent = 'Confirm your password.';
                valid = false;
            } else if (confirmPassword !== password) {
                document.getElementById('errorConfirmPassword').textContent = 'Passwords do not match.';
                valid = false;
            }
            // Terms
            const terms = signupForm.terms.checked;
            if (!terms) {
                document.getElementById('errorTerms').textContent = 'You must agree to the Terms & Conditions.';
                valid = false;
            }
            if (valid) {
                successMessage.textContent = 'Account created successfully!';
                successMessage.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '#'; // Redirect to login page or change link
                }, 1500);
                signupForm.reset();
            }
        });
        // Reset button clears errors and success
        signupForm.addEventListener('reset', function() {
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            successMessage.style.display = 'none';
        });
    </script>
</body>
</html>
