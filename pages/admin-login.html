<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Student Performance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --purple: #92119e;
            --purple-light: #b39ddb;
            --purple-dark: #4b266b;
            --blue: #3a3e9a;
            --white: #fff;
            --glass-bg: rgba(255,255,255,0.18);
            --glass-blur: blur(18px);
            --footer-bg: rgba(179,157,219,0.12);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('../images/Asset/admin.png') center center/cover no-repeat fixed;
            position: relative;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(120deg, rgba(73, 0, 112, 0.72) 60%, rgba(146, 17, 158, 0.62) 100%);
            z-index: 0;
        }
        .navbar-modern {
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0.7rem 0 0.7rem 2.2rem;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 16px 0 #5f0a8722;
            position: relative;
            z-index: 10;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            margin-left: auto;
            margin-right: 2.5rem;
        }
        .navbar-link {
            color: #fff;
            background: rgba(146, 17, 158, 0.13);
            border-radius: 2rem;
            padding: 0.5rem 1.4rem;
            font-weight: 600;
            font-size: 1.08rem;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px #b39ddb22;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar-link.active, .navbar-link:hover {
            background: linear-gradient(90deg, #92119e 60%, #3a3e9a 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 4px 16px #b39ddb33;
        }
        .nav-container {
            width: 95vw;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }
        .nav-links li a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.08rem;
            padding: 0.3rem 0.8rem;
            border-radius: 0.7rem;
            transition: background 0.2s, color 0.2s;
        }
        .nav-links li a.active, .nav-links li a:hover {
            background: var(--purple-light);
            color: var(--purple-dark);
        }
        .main-content {
            flex: 1 0 auto;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: center;
            min-height: 0;
            position: relative;
            z-index: 1;
        }
        .left-features {
            flex: 1 1 0;
            min-width: 320px;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 3vw 2vw 3vw 5vw;
            color: #fff;
            font-size: 1.35rem;
            font-weight: 500;
            z-index: 2;
        }
        .feature-bullets {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .feature-bullets li {
            opacity: 0;
            transform: translateY(30px);
            margin-bottom: 1.5rem;
            font-size: 1.25em;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }
        .feature-bullets li .fa {
            margin-right: 0.7em;
            color: var(--purple-light);
            font-size: 1.2em;
        }
        .feature-bullets li.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.7s, transform 0.7s;
        }
        .login-side {
            flex: 1 1 0;
            min-width: 340px;
            max-width: 440px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 3vw 5vw 3vw 2vw;
            z-index: 2;
        }
        .login-main-card {
            width: 100%;
            max-width: 410px;
            background: rgba(255,255,255,0.22);
            box-shadow: 0 8px 32px 0 #b39ddb55;
            border-radius: 2rem;
            padding: 2.7rem 2.2rem 2.2rem 2.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 3;
            border: 1.5px solid #b39ddb55;
            backdrop-filter: blur(18px);
        }
        .login-heading {
            color: var(--purple-dark);
            font-size: 2.3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-align: center;
        }
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .input-group label {
            font-weight: 700;
            color: var(--purple-dark);
            margin-bottom: 0.1rem;
            font-size: 1.08rem;
        }
        .input-group input {
            padding: 1.1rem 1.2rem;
            border-radius: 0.9rem;
            border: 1.7px solid #b39ddb99;
            font-size: 1.18rem;
            background: #f7faff;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border: 1.7px solid var(--purple);
        }
        .forgot-link {
            background: none;
            border: none;
            color: #fff;
            font-weight: 700;
            text-align: right;
            cursor: pointer;
            margin-bottom: -0.5rem;
            margin-top: -0.5rem;
            width: 100%;
            padding: 0;
            font-size: 1.05rem;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: var(--purple-light);
            text-decoration: underline;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(90deg, var(--purple-light) 0%, var(--purple) 100%);
            color: #fff;
            border: none;
            border-radius: 0.9rem;
            padding: 1.1rem 0;
            font-size: 1.22rem;
            font-weight: 800;
            margin-top: 0.2rem;
            box-shadow: 0 2px 8px 0 #b39ddb33;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: linear-gradient(90deg, var(--purple) 0%, var(--purple-light) 100%);
        }
        .home-btn {
            width: 100%;
            margin-top: 0.7rem;
            font-size: 1.08rem;
            padding: 1rem 0;
            border-radius: 0.9rem;
            border: 1.7px solid var(--purple-light);
            color: var(--purple);
            background: #fff;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            display: block;
        }
        .home-btn:hover {
            background: #b39ddb22;
            color: var(--purple-dark);
        }
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                align-items: stretch;
                justify-content: flex-start;
            }
            .left-features, .login-side {
                max-width: 100vw;
                padding: 5vw 5vw 2vw 5vw;
                align-items: center;
            }
            .login-side {
                justify-content: center;
            }
        }
        @media (max-width: 600px) {
            .main-content {
                flex-direction: column;
            }
            .left-features, .login-side {
                padding: 7vw 2vw 2vw 2vw;
            }
            .login-main-card {
                padding: 2rem 0.7rem 1.5rem 0.7rem;
                min-width: 0;
                width: 100%;
                max-width: 98vw;
            }
        }
        .footer-sticky {
            position: fixed;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            padding: 0.7rem 0 0.3rem 0;
            opacity: 0.92;
            background: var(--footer-bg);
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 0 0 1.5rem 1.5rem;
            width: 100vw;
            z-index: 10;
            font-size: 0.98rem;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <nav class="navbar-modern">
        <div class="navbar-links">
            <a href="../index.html" class="navbar-link"><i class="fa fa-home"></i> Home</a>
            <a href="student-login.html" class="navbar-link"><i class="fa fa-user-graduate"></i> Student Login</a>
            <a href="teacher-login.html" class="navbar-link"><i class="fa fa-chalkboard-teacher"></i> Teacher Login</a>
            <a href="admin-login.html" class="navbar-link active"><i class="fa fa-user-shield"></i> Admin Login</a>
            <a href="contact.html" class="navbar-link"><i class="fa fa-envelope"></i> Contact</a>
        </div>
    </nav>
    <div class="main-content">
        <div class="left-features">
            <ul class="feature-bullets">
                <li><i class="fa fa-user-shield"></i>Manage students, teachers, and classes</li>
                <li><i class="fa fa-bullhorn"></i>Post announcements and news</li>
                <li><i class="fa fa-rupee-sign"></i>Oversee fees and payments</li>
                <li><i class="fa fa-chart-pie"></i>View analytics and reports</li>
                <li><i class="fa fa-cogs"></i>Control system settings</li>
            </ul>
        </div>
        <div class="login-side">
            <div class="login-main-card">
                <h2 class="login-heading">Admin Login</h2>
                <form class="login-form" autocomplete="off">
                    <div class="input-group">
                        <label for="admin-id">Admin ID</label>
                        <input type="text" id="admin-id" name="admin-id" placeholder="Enter your Admin ID" required>
                    </div>
                    <div class="input-group">
                        <label for="admin-password">Password</label>
                        <input type="password" id="admin-password" name="admin-password" placeholder="Enter your password" required>
                    </div>
                    <button type="button" class="forgot-link">Forgot Password?</button>
                    <button type="submit" class="btn btn-primary login-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"><path fill="#fff" d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm7 2h-1.26a8.96 8.96 0 0 1-11.48 0H5a3 3 0 0 0-3 3v2.25A2.75 2.75 0 0 0 4.75 20h14.5A2.75 2.75 0 0 0 22 17.25V15a3 3 0 0 0-3-3Z"/></svg>
                        Login
                    </button>
                    <a href="../index.html" class="btn btn-outline home-btn">&#8592; Home</a>
                </form>
            </div>
        </div>
    </div>
    <footer class="footer-sticky">
        &copy; 2026 Student Performance Tracker. All rights reserved.
    </footer>
    <script>
        // Animated bullet points
        const bullets = document.querySelectorAll('.feature-bullets li');
        let idx = 0;
        function showNextBullet() {
            if (idx < bullets.length) {
                bullets[idx].classList.add('visible');
                idx++;
                setTimeout(showNextBullet, 900);
            }
        }
        window.addEventListener('DOMContentLoaded', showNextBullet);
        // Fake login for demo
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
