<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout | Teacher Dashboard</title>
  <link rel="stylesheet" href="../css/student-dashboard-modern.css" />
  <style>
    body { background: #f7f5ff; }
    .teacher-navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      background: rgba(255,255,255,0.8);
      border-radius: 2.5rem;
      margin: 32px auto 36px auto;
      padding: 14px 44px;
      box-shadow: 0 4px 24px 0 rgba(120, 90, 200, 0.10);
      width: fit-content;
      position: relative;
      z-index: 2;
    }
    .teacher-navbar a {
      text-decoration: none;
      color: #4B3869;
      font-weight: 600;
      font-size: 1.08rem;
      padding: 10px 28px;
      border-radius: 2rem;
      background: linear-gradient(90deg, rgba(180,167,255,0.13), rgba(255,210,245,0.13));
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px 0 rgba(180, 167, 255, 0.08);
      letter-spacing: 0.01em;
      margin: 0 2px;
      position: relative;
    }
    .teacher-navbar a:hover, .teacher-navbar a.active {
      background: linear-gradient(90deg, #b4a7ff 0%, #ffd2f5 100%);
      color: #fff;
      box-shadow: 0 4px 16px 0 rgba(120, 90, 200, 0.13);
      text-shadow: 0 2px 8px rgba(180,167,255,0.10);
      transform: translateY(-2px) scale(1.04);
    }
    .logout-section { max-width: 500px; margin: 0 auto; padding: 80px 0; text-align: center; }
    .logout-title { font-size: 2rem; font-weight: 800; color: #4B3869; margin-bottom: 18px; }
    .logout-msg { font-size: 1.1rem; color: #5a4b7c; margin-bottom: 24px; }
    .logout-btn { background: linear-gradient(90deg, #b4a7ff 0%, #ffd2f5 100%); color: #fff; border: none; border-radius: 1.2rem; padding: 10px 28px; font-size: 1.08rem; font-weight: 600; cursor: pointer; transition: background 0.18s, box-shadow 0.18s; box-shadow: 0 2px 8px 0 rgba(180, 167, 255, 0.10); }
    .logout-btn:hover { background: linear-gradient(90deg, #a18aff 0%, #ffb6e6 100%); box-shadow: 0 4px 16px 0 rgba(180, 167, 255, 0.18); }
    @media (max-width: 900px) {
      .teacher-navbar {
        flex-wrap: wrap;
        padding: 10px 8px;
        gap: 10px;
      }
      .teacher-navbar a {
        font-size: 1rem;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <nav class="teacher-navbar">
    <a href="../index.html">Home</a>
    <a href="teacher-dashboard.html">Dashboard</a>
    <a href="teacher-attendance.html">Attendance</a>
    <a href="teacher-marks.html">Marks</a>
    <a href="teacher-analysis.html">Analysis</a>
    <a href="teacher-feedback.html">Feedback</a>
    <a href="teacher-reports.html">Reports</a>
    <a href="teacher-logout.html" class="active">Logout</a>
  </nav>
  <div class="logout-section">
    <div class="logout-title">You have been logged out</div>
    <div class="logout-msg">Thank you for using the Teacher Dashboard.<br>Click below to return to the login page.</div>
    <a href="teacher-login.html"><button class="logout-btn">Return to Login</button></a>
  </div>
</body>
</html>
