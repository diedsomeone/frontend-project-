<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout | Student Performance Tracker</title>
  <link rel="stylesheet" href="../css/student-dashboard-modern.css" />
  <style>
    .logout-hero {
      background: linear-gradient(120deg, #ffe3f3 60%, #f3eaff 100%);
      border-radius: 2rem;
      padding: 48px 36px 48px 36px;
      margin: 80px auto 0 auto;
      box-shadow: 0 6px 32px 0 rgba(120, 90, 200, 0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 420px;
      position: relative;
    }
    .logout-title {
      font-size: 2.1rem;
      font-weight: 800;
      color: #6a0080;
      margin-bottom: 18px;
      letter-spacing: 1px;
      text-align: center;
    }
    .logout-msg {
      font-size: 1.13rem;
      color: #7c6bb3;
      margin-bottom: 28px;
      text-align: center;
    }
    .logout-btn {
      background: linear-gradient(90deg, #b4a7ff 0%, #ffd2f5 100%);
      color: #fff;
      border: none;
      border-radius: 1.2rem;
      padding: 12px 36px;
      font-size: 1.08rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px 0 rgba(180, 167, 255, 0.10);
      transition: background 0.18s, box-shadow 0.18s;
    }
    .logout-btn:hover {
      background: linear-gradient(90deg, #a18aff 0%, #ffb6e6 100%);
      box-shadow: 0 4px 16px 0 rgba(180, 167, 255, 0.18);
    }
  </style>
</head>
<body style="background: url('../images/Asset/dashboard.png') center center/cover no-repeat fixed; position: relative; min-height: 100vh;">
  <div class="bg-overlay"></div>
  <div class="dashboard-container" style="position:relative;z-index:1;">
    <div class="logout-hero">
      <div class="logout-title">You have been logged out</div>
      <div class="logout-msg">Thank you for using the Student Performance Tracker.<br>We hope to see you again soon!</div>
      <a href="../index.html" class="logout-btn">Return to Home</a>
    </div>
  </div>
</body>
</html>
<style>
  .bg-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(120deg, rgba(73, 0, 112, 0.72) 60%, rgba(146, 17, 158, 0.62) 100%);
    z-index: 0;
    pointer-events: none;
  }
</style>
