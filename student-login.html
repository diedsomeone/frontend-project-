<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Student Performance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <script defer src="../js/main.js"></script>
</head>
<body>
    <!-- Navigation Menu -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">SPT</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="student-login.html" class="active">Student Login</a></li>
                <li><a href="teacher-login.html">Teacher Login</a></li>
                <li><a href="admin-login.html">Admin Login</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>
    <section class="container login-section fadein-section" style="background: linear-gradient(120deg, #e0e7ff 0%, #f7faff 100%); min-height: 90vh;">
        <div class="login-card animated fadeInUp" style="box-shadow: 0 8px 32px 0 rgba(79,140,255,0.18);">
                <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 1rem;">
                    <div class="avatar-img-wrapper">
                        <img src="../images/Asset/student.png" alt="Student Logo" class="avatar-img">
                    </div>
                    <h2 class="login-heading" style="margin-top: 0.7rem;">Student Login</h2>
                </div>
            <form class="login-form" autocomplete="off">
                <div class="input-group">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="student-id" placeholder="Enter your Student ID" required>
                </div>
                <div class="input-group">
                    <label for="student-password">Password</label>
                    <input type="password" id="student-password" name="student-password" placeholder="Enter your password" required>
                </div>
                <div class="form-links" style="display: flex; flex-direction: column; align-items: stretch; gap: 0.7rem; margin-bottom: 0.5rem;">
                    <button type="button" class="forgot-link" style="align-self: flex-end; margin-bottom: 0.2rem;">Forgot Password?</button>
                    <button type="submit" class="btn btn-primary login-btn" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; min-width: 110px; justify-content: center;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"><path fill="#fff" d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm7 2h-1.26a8.96 8.96 0 0 1-11.48 0H5a3 3 0 0 0-3 3v2.25A2.75 2.75 0 0 0 4.75 20h14.5A2.75 2.75 0 0 0 22 17.25V15a3 3 0 0 0-3-3Z"/></svg>
                        Login
                    </button>
                </div>
            </form>
            <a href="../index.html" class="btn btn-outline home-btn" style="margin-top: 0.7rem; max-width: 120px; font-size: 0.95rem; padding: 0.5rem 1rem; align-self: center;">&#8592; Home</a>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <p style="text-align: center;">&copy; 2026 Student Performance Tracker. All rights reserved.</p>
        </div>
    </footer>
    <script>
    // Fake login for demo
    document.querySelector('.login-form').addEventListener('submit', function(e) {
        e.preventDefault();        <!-- student-login.html -->
         <!-- ...existing code... -->
        window.location.href = 'student-dashboard.html';
    });
    </script>
</body>
</html>
