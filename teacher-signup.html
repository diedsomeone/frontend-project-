<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration - Student Performance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
            body {
                min-height: 100vh;
                margin: 0;
                font-family: 'Poppins', 'Inter', 'Segoe UI', Arial, sans-serif;
                background: url('../images/Asset/teacher.png') center center/cover no-repeat fixed;
                position: relative;
                overflow-x: hidden;
            }
            .bg-overlay {
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background: linear-gradient(120deg, rgba(30,0,60,0.7) 0%, rgba(44,0,77,0.7) 100%);
                z-index: 0;
                pointer-events: none;
                mix-blend-mode: multiply;
            }
            .bg-darken {
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0,0,0,0.45);
                z-index: 1;
                pointer-events: none;
            }
            .teacher-container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: relative;
                z-index: 2;
                animation: fadeInUp 1.2s cubic-bezier(.23,1.01,.32,1) both;
            }
            @keyframes fadeInUp {
                0% { opacity: 0; transform: translateY(40px); }
                100% { opacity: 1; transform: none; }
            }
            .teacher-card {
                background: rgba(255,255,255,0.22);
                border-radius: 2rem;
                box-shadow: 0 8px 32px 0 #0008, 0 2px 8px #b39ddb33;
                backdrop-filter: blur(18px);
                border: 1px solid rgba(255,255,255,0.3);
                padding: 2.5rem 2.5rem 2.2rem 2.5rem;
                max-width: 430px;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 2.5rem auto 2.5rem auto;
                z-index: 2;
                animation: fadeInUp 1.5s cubic-bezier(.23,1.01,.32,1) both;
                transition: box-shadow 0.3s, background 0.3s;
            }
            .teacher-card:hover {
                box-shadow: 0 16px 48px #b39ddb99, 0 0px 24px #3a3e9a55;
                background: rgba(179,157,219,0.22);
            }
            .teacher-title {
                color: #fff;
                font-size: 2.3rem;
                font-weight: 800;
                margin-bottom: 0.7rem;
                text-shadow: 0 2px 16px #3a3e9a55;
                letter-spacing: 1px;
                text-align: center;
                display: flex;
                align-items: center;
                gap: 0.7rem;
                justify-content: center;
                animation: fadeInDown 1.1s cubic-bezier(.23,1.01,.32,1) both;
            }
            @keyframes fadeInDown {
                0% { opacity: 0; transform: translateY(-40px); }
                100% { opacity: 1; transform: none; }
            }
            .teacher-subtitle {
                color: #b39ddb;
                font-size: 1.18rem;
                font-weight: 500;
                margin-bottom: 2.2rem;
                text-align: center;
                text-shadow: 0 2px 8px #000a, 0 1px 0 #b39ddb33;
                line-height: 1.6;
                max-width: 700px;
            }
            .teacher-form {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1.1rem;
                margin-top: 0.5rem;
            }
            .teacher-form label {
                color: #4f8cff;
                font-weight: 700;
                font-size: 1.08rem;
                margin-bottom: 0.2rem;
                align-self: flex-start;
            }
            .teacher-form input, .teacher-form select {
                width: 100%;
                padding: 0.8rem 1.1rem;
                border-radius: 0.9rem;
                border: 1.5px solid #b39ddb99;
                font-size: 1.08rem;
                background: #fff;
                outline: none;
                margin-bottom: 0.2rem;
                transition: border 0.2s;
                color: #3a3e9a;
                font-family: inherit;
                box-sizing: border-box;
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
            }
            .teacher-form input:focus, .teacher-form select:focus {
                border: 1.5px solid #92119e;
            }
            .teacher-form .toggle-password {
                position: absolute;
                right: 0.8rem;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                color: #b0b0b0;
                font-size: 1.1rem;
                transition: color 0.2s;
            }
            .teacher-form .toggle-password:hover {
                color: #4f8cff;
            }
            .error-message {
                color: #ff4d4d;
                font-size: 0.85rem;
                margin-top: 0.2rem;
                min-height: 1.1em;
            }
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 0.7rem;
                margin-top: 0.5rem;
                width: 100%;
                flex-direction: row;
            }
            .checkbox-group input[type="checkbox"] {
                width: 22px;
                height: 22px;
                accent-color: #92119e;
                cursor: pointer;
            }
            .checkbox-group label {
                font-size: 1rem;
                line-height: 1.2;
                cursor: pointer;
                color: #4f8cff;
            }
            .checkbox-group a {
                color: #4f8cff !important;
                text-decoration: underline;
            }
            .form-actions {
                display: flex;
                flex-direction: row;
                gap: 1rem;
                margin-top: 1rem;
            }
            .btn {
                padding: 0.75rem 1.5rem;
                border: none;
                border-radius: 2rem;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                background: linear-gradient(90deg, #92119e 0%, #3a3e9a 100%);
                color: #fff;
                transition: background 0.3s, transform 0.2s;
                box-shadow: 0 4px 16px #b39ddb55, 0 0px 16px #3a3e9a33;
                outline: none;
                letter-spacing: 0.5px;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                justify-content: center;
            }
            .btn:hover {
                background: linear-gradient(90deg, #3a3e9a 0%, #92119e 100%);
                transform: scale(1.05) translateY(-2px);
                box-shadow: 0 8px 32px #b39ddb99, 0 0px 24px #3a3e9a55;
                filter: brightness(1.1);
            }
            .btn-reset {
                background: #f0f0f0;
                color: #3a3a3a;
                border: 1px solid #d0d0d0;
                transition: background 0.3s, color 0.3s;
            }
            .btn-reset:hover {
                background: #e0eafc;
                color: #4f8cff;
            }
            .login-link {
                display: block;
                text-align: center;
                margin-top: 1.2rem;
                color: #4f8cff;
                text-decoration: none;
                font-size: 1rem;
                transition: color 0.2s;
            }
            .login-link:hover {
                color: #92119e;
            }
            .success-message {
                text-align: center;
                color: #4f8cff;
                font-size: 1.1rem;
                margin-top: 1rem;
                font-weight: 600;
                animation: fadeIn 0.7s;
            }
            @media (max-width: 600px) {
                .teacher-title {
                    font-size: 1.5rem;
                    padding: 0.7rem 1rem 0.7rem 1rem;
                }
                .teacher-card {
                    padding: 1.2rem 0.7rem 1.2rem 0.7rem;
                    max-width: 98vw;
                }
            }
            @keyframes fadeIn {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
        </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-darken"></div>
    <div class="teacher-container">
        <div class="teacher-card">
            <div class="teacher-title">Teacher signup</div>
            <form class="teacher-form" id="teacherSignupForm" autocomplete="off">
                <div class="input-group">
                    <label for="teacherName">Full Name</label>
                    
                    <input type="text" id="teacherName" name="teacherName" required placeholder="Enter your name">
                    <div class="error-message" id="errorTeacherName"></div>
                </div>
                <div class="input-group">
                    <label for="teacherId">Teacher ID</label>
                   >
                    <input type="text" id="teacherId" name="teacherId" required placeholder="Enter teacher ID">
                    <div class="error-message" id="errorTeacherId"></div>
                </div>
                <div class="input-group">
                    <label for="teacherEmail">Email Address</label>
                 
                    <input type="email" id="teacherEmail" name="teacherEmail" required placeholder="Enter your email">
                    <div class="error-message" id="errorTeacherEmail"></div>
                </div>
                <div class="input-group">
                    <label for="teacherSubject">Subject specilization </label>
                    <input type="text" id="teacherSubject" name="teacherSubject" required placeholder="Enter subject">
                    <div class="error-message" id="errorTeacherSubject"></div>
                </div>
                <div class="input-group">
                    <label for="teacherDepartment">Department</label>
                    <input type="text" id="teacherDepartment" name="teacherDepartment" required placeholder="Enter department">
                    <div class="error-message" id="errorTeacherDepartment"></div>
                </div>
                <div class="input-group">
                    <label for="teacherPhone">Phone Number</label>
                    
                    <input type="text" id="teacherPhone" name="teacherPhone" required placeholder="Enter phone number">
                    <div class="error-message" id="errorTeacherPhone"></div>
                </div>
                <div class="input-group">
                    <label for="teacherPassword">Password</label>
                    
                    <input type="password" id="teacherPassword" name="teacherPassword" required placeholder="Enter password">
                    <span class="toggle-password" id="toggleTeacherPassword"><i class="fa fa-eye"></i></span>
                    <div class="error-message" id="errorTeacherPassword"></div>
                </div>
                <div class="input-group">
                    <label for="teacherConfirmPassword">Confirm Password</label>
                 
                    <input type="password" id="teacherConfirmPassword" name="teacherConfirmPassword" required placeholder="Confirm password">
                    <span class="toggle-password" id="toggleTeacherConfirmPassword"><i class="fa fa-eye"></i></span>
                    <div class="error-message" id="errorTeacherConfirmPassword"></div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="teacherTerms" name="teacherTerms" required>
                    <label for="teacherTerms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>
                <div class="error-message" id="errorTeacherTerms"></div>
                <div class="form-actions">
                                        <button type="submit" class="btn">Sign Up</button>
                                        <button type="reset" class="btn btn-reset">Reset</button>
                                </div>
                        </form>
                        <a href="index.html" class="return-home-btn" style="margin-top:1.7rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.5rem;background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);border-radius:2rem;font-weight:700;font-size:1.08rem;color:#fff;box-shadow:0 2px 8px #b39ddb33;transition:background 0.2s,color 0.2s,transform 0.2s;">
                            <i class="fa fa-arrow-left"></i> Return to Home
                        </a>
            <a href="#" class="login-link">Already have an account? Login</a>
            <div class="success-message" id="teacherSuccessMessage" style="display:none;"></div>
        </div>
    </div>
    <script>
        // Password show/hide toggle
        const teacherPasswordInput = document.getElementById('teacherPassword');
        const teacherConfirmPasswordInput = document.getElementById('teacherConfirmPassword');
        const toggleTeacherPassword = document.getElementById('toggleTeacherPassword');
        const toggleTeacherConfirmPassword = document.getElementById('toggleTeacherConfirmPassword');
        toggleTeacherPassword.addEventListener('click', () => {
            const type = teacherPasswordInput.type === 'password' ? 'text' : 'password';
            teacherPasswordInput.type = type;
            toggleTeacherPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
        });
        toggleTeacherConfirmPassword.addEventListener('click', () => {
            const type = teacherConfirmPasswordInput.type === 'password' ? 'text' : 'password';
            teacherConfirmPasswordInput.type = type;
            toggleTeacherConfirmPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
        });

        // Form validation
        const teacherSignupForm = document.getElementById('teacherSignupForm');
        const teacherSuccessMessage = document.getElementById('teacherSuccessMessage');
        teacherSignupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            teacherSuccessMessage.style.display = 'none';

            // Full Name
            const teacherName = teacherSignupForm.teacherName.value.trim();
            if (!teacherName) {
                document.getElementById('errorTeacherName').textContent = 'Full Name is required.';
                valid = false;
            }
            // Teacher ID
            const teacherId = teacherSignupForm.teacherId.value.trim();
            if (!teacherId) {
                document.getElementById('errorTeacherId').textContent = 'Teacher ID is required.';
                valid = false;
            }
            // Email
            const teacherEmail = teacherSignupForm.teacherEmail.value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!teacherEmail) {
                document.getElementById('errorTeacherEmail').textContent = 'Email is required.';
                valid = false;
            } else if (!emailPattern.test(teacherEmail)) {
                document.getElementById('errorTeacherEmail').textContent = 'Enter a valid email address.';
                valid = false;
            }
            // Subject
            const teacherSubject = teacherSignupForm.teacherSubject.value.trim();
            if (!teacherSubject) {
                document.getElementById('errorTeacherSubject').textContent = 'Subject is required.';
                valid = false;
            }
            // Department
            const teacherDepartment = teacherSignupForm.teacherDepartment.value.trim();
            if (!teacherDepartment) {
                document.getElementById('errorTeacherDepartment').textContent = 'Department is required.';
                valid = false;
            }
            // Phone
            const teacherPhone = teacherSignupForm.teacherPhone.value.trim();
            if (!teacherPhone) {
                document.getElementById('errorTeacherPhone').textContent = 'Phone number is required.';
                valid = false;
            } else if (!/^\d+$/.test(teacherPhone)) {
                document.getElementById('errorTeacherPhone').textContent = 'Phone number must be numeric.';
                valid = false;
            }
            // Password
            const teacherPassword = teacherSignupForm.teacherPassword.value;
            if (!teacherPassword) {
                document.getElementById('errorTeacherPassword').textContent = 'Password is required.';
                valid = false;
            } else if (teacherPassword.length < 6) {
                document.getElementById('errorTeacherPassword').textContent = 'Password must be at least 6 characters.';
                valid = false;
            }
            // Confirm Password
            const teacherConfirmPassword = teacherSignupForm.teacherConfirmPassword.value;
            if (!teacherConfirmPassword) {
                document.getElementById('errorTeacherConfirmPassword').textContent = 'Confirm your password.';
                valid = false;
            } else if (teacherConfirmPassword !== teacherPassword) {
                document.getElementById('errorTeacherConfirmPassword').textContent = 'Passwords do not match.';
                valid = false;
            }
            // Terms
            const teacherTerms = teacherSignupForm.teacherTerms.checked;
            if (!teacherTerms) {
                document.getElementById('errorTeacherTerms').textContent = 'You must agree to the Terms & Conditions.';
                valid = false;
            }
            if (valid) {
                teacherSuccessMessage.textContent = 'Account created successfully!';
                teacherSuccessMessage.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '#'; // Redirect to login page or change link
                }, 1500);
                teacherSignupForm.reset();
            }
        });
        // Reset button clears errors and success
        teacherSignupForm.addEventListener('reset', function() {
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            teacherSuccessMessage.style.display = 'none';
        });
    </script>
</body>
</html>
